<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho de Compras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🛒 Carrinho de Compras</h1>
    <p class="subtitle">Seus itens salvos localmente</p>
  </header>

  <main>
    <section class="form-section">
      <h2 id="form-title">Adicionar produto</h2>
      <div class="form-row">
        <input type="text" id="input-nome" placeholder="Nome do produto" autocomplete="off" />
        <input type="number" id="input-qtd" placeholder="Qtd" min="1" value="1" />
        <button id="btn-adicionar" onclick="adicionarOuSalvar()">Adicionar</button>
        <button id="btn-cancelar" class="btn-secundario" onclick="cancelarEdicao()" style="display:none">Cancelar</button>
      </div>
    </section>

    <section class="lista-section">
      <div class="lista-header">
        <span id="contador">0 itens</span>
        <button class="btn-perigo-outline" onclick="limparTudo()" id="btn-limpar" style="display:none">Limpar tudo</button>
      </div>

      <div id="lista-vazia" class="vazio">
        <span>🧺</span>
        <p>Nenhum produto adicionado ainda.</p>
      </div>

      <table id="tabela" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Produto</th>
            <th>Qtd</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>Dados salvos em <code>/compras/lista.json</code> — funciona offline</p>
  </footer>

  <!-- Modal de confirmação de exclusão -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <p>Remover <strong id="modal-nome"></strong>?</p>
      <div class="modal-acoes">
        <button class="btn-perigo" onclick="confirmarExclusao()">Remover</button>
        <button class="btn-secundario" onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
